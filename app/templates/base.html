<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mastoferr{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/Gemini_Generated_Image_39fcp139fcp139fc.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <aside class="main-sidebar" id="main-sidebar">
        <div class="nav-brand">
            <a href="/"><img src="/static/Gemini_Generated_Image_39fcp139fcp139fc.png" alt="Mastoferr" class="nav-logo"> Mastoferr</a>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <div class="sidebar-nav-sep"></div>
            <a href="/toots" class="{% if request.url.path == '/toots' %}active{% endif %}">Toots</a>
            <a href="/notifications" class="{% if request.url.path == '/notifications' %}active{% endif %}">Notifs</a>
            <a href="/favorites" class="{% if request.url.path == '/favorites' %}active{% endif %}">Favorites</a>
            <a href="/bookmarks" class="{% if request.url.path == '/bookmarks' %}active{% endif %}">Bookmarks</a>
            <div class="sidebar-nav-sep"></div>
            <a href="/followers" class="{% if request.url.path == '/followers' %}active{% endif %}">Users</a>
            <a href="/interactions" class="{% if request.url.path == '/interactions' %}active{% endif %}">{{ app_settings().get('interactions_tab_name') or 'Friends or Stalkers' }}</a>
            <a href="/hashtags" class="{% if request.url.path == '/hashtags' %}active{% endif %}">Hashtags</a>
            <a href="/topics" class="{% if request.url.path == '/topics' %}active{% endif %}">Topics</a>
            <div class="sidebar-nav-sep"></div>
            <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">Logs</a>
            <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
            {% block sidebar_extra %}{% endblock %}
        </nav>
    </aside>

    <div class="page-wrapper">
        <header class="topbar">
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
            <form class="topbar-search" action="/search" method="get">
                <input type="text" name="q" placeholder="Search..." value="{{ request.query_params.get('q', '') }}">
                <button type="submit">&#128269;</button>
            </form>
        </header>

        <main class="container">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <span>Mastoferr v{{ APP_VERSION }}</span>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
