{% extends "base.html" %}
{% block title %}Hashtags - Mastoferr{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;">
    <h1 style="margin:0;">Hashtag Cloud <span class="count">({{ total }} tags)</span></h1>
    <select onchange="location.href='?period='+this.value"
            style="background:var(--card-bg);color:var(--text);border:1px solid var(--border);
                   border-radius:6px;padding:0.3rem 0.6rem;font-size:0.9rem;cursor:pointer;">
        {% for key, label in period_labels.items() %}
        <option value="{{ key }}" {% if period == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</div>

{% if hashtags %}
<div class="tag-cloud">
    {% for tag in hashtags %}
    <a href="/search?q=%23{{ tag.name }}" class="cloud-tag" style="font-size: {{ tag.weight }}rem;" title="#{{ tag.name }} ({{ tag.count }})">
        #{{ tag.name }}
    </a>
    {% endfor %}
</div>
{% else %}
    <p class="empty">No hashtags found yet. Sync some toots first.</p>
{% endif %}
{% endblock %}
