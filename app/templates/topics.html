{% extends "base.html" %}
{% block title %}Topics - Mastoferr{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;">
    <h1 style="margin:0;">Topic Cloud <span class="count">({{ total }} topics)</span></h1>
    <select onchange="location.href='?period='+this.value"
            style="background:var(--card-bg);color:var(--text);border:1px solid var(--border);
                   border-radius:6px;padding:0.3rem 0.6rem;font-size:0.9rem;cursor:pointer;">
        {% for key, label in period_labels.items() %}
        <option value="{{ key }}" {% if period == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</div>

{% if topics %}
<div class="tag-cloud">
    {% for topic in topics %}
    <a href="/search?q={{ topic.name }}" class="cloud-tag cloud-tag-topic" style="font-size: {{ topic.weight }}rem;" title="{{ topic.name }} ({{ topic.count }})">
        {{ topic.name }}
    </a>
    {% endfor %}
</div>
{% else %}
    <p class="empty">No topics found yet. Sync some toots first.</p>
{% endif %}
{% endblock %}
