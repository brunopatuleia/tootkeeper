services:
  tootkeeper:
    build: .
    container_name: tootkeeper
    restart: unless-stopped
    ports:
      - "6886:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
